name: RAQAM Daily Scraper

on:
  schedule:
    - cron: '0 23 * * *'   # 3:00 AM Dubai time (UTC+4) — full scrape
    - cron: '0 5 * * *'    # 9:00 AM Dubai time — price refresh
  workflow_dispatch:        # Manual trigger from GitHub UI anytime
    inputs:
      mode:
        description: 'Scraper mode'
        required: false
        default: 'full'
        type: choice
        options: ['full', 'enrich', 'price-refresh']
      dry_run:
        description: 'Dry run — no DB writes, just test'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  scrape:
    name: Scrape Dubai Projects
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd raqam-scraper && npm install

      - name: Run full scraper (3am scheduled)
        if: github.event.schedule == '0 23 * * *'
        run: cd raqam-scraper && node scraper.js --mode=full
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Run price refresh (9am scheduled)
        if: github.event.schedule == '0 5 * * *'
        run: cd raqam-scraper && node scraper.js --mode=price-refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then DRY="--dry-run"; fi
          cd raqam-scraper && node scraper.js --mode=${{ github.event.inputs.mode }} $DRY
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: DB summary
        if: always()
        run: |
          echo "=== Latest scraper run ==="
          curl -s "$SUPABASE_URL/rest/v1/scraper_runs?order=started_at.desc&limit=1&select=source,status,projects_found,projects_new,errors,started_at,completed_at" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" | python3 -m json.tool || echo "n/a"
          echo "=== Total projects in DB ==="
          curl -s "$SUPABASE_URL/rest/v1/projects?select=count" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Prefer: count=exact" -I 2>/dev/null | grep -i content-range || echo "n/a"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
