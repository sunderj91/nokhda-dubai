<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RAQAM · Dubai Real Estate Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js" crossorigin="anonymous"></script>
<style>
/* ══════════════════════════════════════════════
   RAQAM DUBAI v9 — DESIGN TOKENS
══════════════════════════════════════════════ */
:root {
  --lw: 280px; --rw: 320px; --th: 52px; --bh: 44px;
  --r: 10px; --r2: 14px;
  --trans: 0.24s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] {
  --bg: #03060F; --bg2: #060A16; --surf: rgba(6,10,22,0.92); --surf2: rgba(8,13,26,0.86);
  --bord: rgba(255,255,255,0.07); --bord2: rgba(255,255,255,0.13);
  --text: #E8EDF5; --text2: rgba(232,237,245,0.52); --text3: rgba(232,237,245,0.28);
  --accent: #00D4FF; --accent2: rgba(0,212,255,0.1); --accent3: rgba(0,212,255,0.06);
  --green: #00E5A0; --red: #FF4455; --amber: #F5C33C; --orange: #FF8232;
  --blur: blur(20px) saturate(1.6);
  --map-style: https://api.maptiler.com/maps/backdrop-dark/style.json?key=ecydpiGmOMxHOQIYou4e;
  --map-sat: https://api.maptiler.com/maps/hybrid/style.json?key=ecydpiGmOMxHOQIYou4e;
}
[data-theme="light"] {
  --bg: #EEF1F8; --bg2: #E4E8F2; --surf: rgba(255,255,255,0.92); --surf2: rgba(240,243,250,0.9);
  --bord: rgba(0,0,0,0.07); --bord2: rgba(0,0,0,0.13);
  --text: #0A0F1E; --text2: rgba(10,15,30,0.52); --text3: rgba(10,15,30,0.28);
  --accent: #0052CC; --accent2: rgba(0,82,204,0.09); --accent3: rgba(0,82,204,0.04);
  --green: #00A86B; --red: #D93025; --amber: #C8960A; --orange: #D85F00;
  --blur: blur(20px) saturate(1.4);
  --map-style: https://api.maptiler.com/maps/backdrop/style.json?key=ecydpiGmOMxHOQIYou4e;
  --map-sat: https://api.maptiler.com/maps/hybrid/style.json?key=ecydpiGmOMxHOQIYou4e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; }

/* ══ GLASS PANEL ══ */
.panel {
  background: var(--surf);
  border: 1px solid var(--bord);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  transition: background var(--trans), border var(--trans);
}

/* ══ MAP ══ */
#map { position: fixed; inset: 0; }
.maplibregl-ctrl-attrib { display: none !important; }
.maplibregl-ctrl-logo { display: none !important; }

/* ══ TOP BAR ══ */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--th);
  z-index: 200; display: flex; align-items: center; gap: 0;
  border-bottom: 1px solid var(--bord);
  background: var(--surf); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
}
.tb-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 0 18px; border-right: 1px solid var(--bord2); height: 100%; flex-shrink: 0;
}
.tb-logo-mark {
  width: 28px; height: 28px; border-radius: 8px; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px;
  color: #000; letter-spacing: -.3px; flex-shrink: 0;
}
[data-theme="light"] .tb-logo-mark { color: #fff; }
.tb-logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: .03em; }
.tb-logo-sub { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-top: 1px; }
.tb-sep { width: 1px; height: 24px; background: var(--bord2); margin: 0 4px; flex-shrink: 0; }
.tb-pills { display: flex; gap: 2px; padding: 0 8px; align-items: center; }
.tb-pill {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--text2); padding: 5px 11px; border-radius: 16px;
  cursor: pointer; border: none; background: transparent; transition: all .18s; white-space: nowrap;
}
.tb-pill:hover { background: var(--accent2); color: var(--accent); }
.tb-pill.active { background: var(--accent2); color: var(--accent); border: 1px solid rgba(0,212,255,.2); }
[data-theme="light"] .tb-pill.active { border-color: rgba(0,82,204,.2); }
.tb-right { display: flex; align-items: center; gap: 6px; margin-left: auto; padding-right: 14px; }
.tb-btn {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--bord2);
  background: transparent; color: var(--text2); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center; transition: all .18s;
  font-family: 'IBM Plex Mono', monospace;
}
.tb-btn:hover, .tb-btn.active { background: var(--accent2); color: var(--accent); border-color: var(--accent); }
.live-badge {
  display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px;
  background: var(--accent3); border: 1px solid var(--bord2);
  font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: .1em;
  text-transform: uppercase; color: var(--green);
}
.live-badge::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.4)} }

/* ══ LAYER TOOLBAR (horizontal below topbar) ══ */
#layerbar {
  position: fixed; top: var(--th); left: 0; right: 0; height: 40px;
  z-index: 190; display: flex; align-items: center; gap: 0;
  border-bottom: 1px solid var(--bord);
  background: var(--surf2); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  padding: 0 16px; overflow-x: auto;
}
#layerbar::-webkit-scrollbar { display: none; }
.lb-group { display: flex; align-items: center; gap: 2px; padding-right: 12px; border-right: 1px solid var(--bord); margin-right: 12px; }
.lb-group:last-child { border-right: none; margin-right: 0; }
.lb-label { font-family: 'IBM Plex Mono', monospace; font-size: 7px; letter-spacing: .14em; text-transform: uppercase; color: var(--text3); padding-right: 8px; white-space: nowrap; }
.lb-pill {
  display: flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 10px;
  font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: .04em; text-transform: uppercase;
  color: var(--text3); cursor: pointer; border: 1px solid transparent; transition: all .18s; white-space: nowrap;
}
.lb-pill:hover { color: var(--text2); background: var(--accent3); }
.lb-pill.active { color: var(--accent); background: var(--accent2); border-color: rgba(0,212,255,.18); }
[data-theme="light"] .lb-pill.active { border-color: rgba(0,82,204,.18); }
.lb-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ══ LEFT PANEL — AREA LIST ══ */
#left-panel {
  position: fixed; left: 0; top: calc(var(--th) + 40px); bottom: var(--bh);
  width: var(--lw); z-index: 150; display: flex; flex-direction: column;
  border-right: 1px solid var(--bord);
  background: var(--surf); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  transition: transform var(--trans);
}
#left-panel.collapsed { transform: translateX(calc(-1 * var(--lw))); }
.lp-search {
  padding: 12px 14px; border-bottom: 1px solid var(--bord); flex-shrink: 0;
}
.lp-search-inner {
  display: flex; align-items: center; gap: 8px; padding: 7px 11px;
  border-radius: 8px; background: var(--bg2); border: 1px solid var(--bord2);
  transition: border var(--trans);
}
.lp-search-inner:focus-within { border-color: var(--accent); }
.lp-search-inner input {
  flex: 1; background: none; border: none; outline: none; color: var(--text);
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .02em;
}
.lp-search-inner input::placeholder { color: var(--text3); }
.lp-search-icon { color: var(--text3); font-size: 12px; flex-shrink: 0; }
.lp-stats { display: flex; gap: 0; border-bottom: 1px solid var(--bord); flex-shrink: 0; }
.lp-stat { flex: 1; padding: 10px 12px; border-right: 1px solid var(--bord); }
.lp-stat:last-child { border-right: none; }
.lp-stat-l { font-family: 'IBM Plex Mono', monospace; font-size: 7px; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); margin-bottom: 2px; }
.lp-stat-v { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.02em; line-height: 1; }
.lp-stat-d { font-family: 'IBM Plex Mono', monospace; font-size: 9px; margin-top: 1px; }
.lp-stat-d.up { color: var(--green); } .lp-stat-d.dn { color: var(--red); }
.lp-sort { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-bottom: 1px solid var(--bord); flex-shrink: 0; }
.lp-sort-l { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); }
.sort-btn { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: .06em; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; border: 1px solid var(--bord); background: transparent; color: var(--text3); cursor: pointer; transition: all .15s; }
.sort-btn:hover, .sort-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent2); }
.lp-list { flex: 1; overflow-y: auto; padding: 6px 0; }
.lp-list::-webkit-scrollbar { width: 3px; }
.lp-list::-webkit-scrollbar-thumb { background: var(--bord2); border-radius: 2px; }
.area-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 14px;
  cursor: pointer; transition: background .15s; position: relative; border-left: 2px solid transparent;
}
.area-row:hover { background: var(--accent3); }
.area-row.active { background: var(--accent2); border-left-color: var(--accent); }
.ar-rank { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text3); width: 16px; flex-shrink: 0; text-align: right; }
.ar-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.ar-info { flex: 1; min-width: 0; }
.ar-name { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ar-sub { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text3); margin-top: 1px; }
.ar-psf { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; color: var(--text); flex-shrink: 0; text-align: right; }
.ar-yoy { font-family: 'IBM Plex Mono', monospace; font-size: 9px; flex-shrink: 0; width: 42px; text-align: right; }
.ar-yoy.up { color: var(--green); } .ar-yoy.dn { color: var(--red); }

/* ══ RIGHT PANEL — AREA DETAIL ══ */
#right-panel {
  position: fixed; right: 0; top: calc(var(--th) + 40px); bottom: var(--bh);
  width: var(--rw); z-index: 150; display: flex; flex-direction: column;
  border-left: 1px solid var(--bord);
  background: var(--surf); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  transition: transform var(--trans); transform: translateX(var(--rw));
}
#right-panel.open { transform: translateX(0); }
.rp-header { padding: 16px; border-bottom: 1px solid var(--bord); flex-shrink: 0; }
.rp-area-name { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -.02em; line-height: 1.1; margin-bottom: 4px; }
.rp-area-sub { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); }
.rp-close { position: absolute; top: 14px; right: 14px; width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--bord2); background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.rp-close:hover { background: var(--accent2); color: var(--accent); }
.rp-kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--bord); border-bottom: 1px solid var(--bord); flex-shrink: 0; }
.rp-kpi { padding: 12px 14px; background: var(--surf); }
.rp-kpi-l { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
.rp-kpi-v { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -.02em; line-height: 1; }
.rp-kpi-d { font-family: 'IBM Plex Mono', monospace; font-size: 9px; margin-top: 3px; }
.rp-kpi-d.up { color: var(--green); } .rp-kpi-d.dn { color: var(--red); }
.rp-score-bar { padding: 14px 16px; border-bottom: 1px solid var(--bord); flex-shrink: 0; }
.rp-score-label { display: flex; justify-content: space-between; margin-bottom: 7px; }
.rp-score-l { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); }
.rp-score-v { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500; }
.rp-bar { height: 4px; border-radius: 2px; background: var(--bord); overflow: hidden; margin-bottom: 8px; }
.rp-bar-fill { height: 100%; border-radius: 2px; transition: width .8s cubic-bezier(.4,0,.2,1); }
.rp-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.rp-tag { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: .06em; text-transform: uppercase; padding: 3px 7px; border-radius: 5px; border: 1px solid var(--bord2); color: var(--text2); }
.rp-chart-wrap { padding: 14px 16px; border-bottom: 1px solid var(--bord); flex-shrink: 0; }
.rp-chart-title { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
.rp-chart { display: flex; align-items: flex-end; gap: 3px; height: 56px; }
.rp-bar-col { flex: 1; border-radius: 3px 3px 0 0; min-height: 4px; transition: all .4s; cursor: pointer; position: relative; }
.rp-bar-col:hover { opacity: .85; }
.rp-bar-col .rp-bar-tip { position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: var(--bg); border: 1px solid var(--bord2); border-radius: 5px; padding: 3px 6px; font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: var(--text); white-space: nowrap; opacity: 0; transition: opacity .15s; pointer-events: none; z-index: 10; }
.rp-bar-col:hover .rp-bar-tip { opacity: 1; }
.rp-listings { flex: 1; overflow-y: auto; padding: 0; }
.rp-listings::-webkit-scrollbar { width: 3px; }
.rp-listings::-webkit-scrollbar-thumb { background: var(--bord2); border-radius: 2px; }
.rp-listing {
  display: flex; align-items: center; gap: 10px; padding: 11px 16px;
  border-bottom: 1px solid var(--bord); cursor: pointer; transition: background .15s;
}
.rp-listing:hover { background: var(--accent3); }
.rp-listing-icon { width: 32px; height: 32px; border-radius: 7px; background: var(--accent2); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.rp-listing-info { flex: 1; min-width: 0; }
.rp-listing-type { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); }
.rp-listing-name { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--text); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rp-listing-price { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; color: var(--text); text-align: right; }
.rp-listing-size { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text3); text-align: right; margin-top: 1px; }

/* ══ MAP TOOLTIP ══ */
.map-tooltip {
  background: var(--surf2); border: 1px solid var(--bord2); border-radius: 10px;
  padding: 10px 13px; min-width: 150px; pointer-events: none;
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
.mt-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.mt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
.mt-l { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); }
.mt-v { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text); font-weight: 500; }

/* ══ ZOOM CONTROLS ══ */
#zoom-ctrl {
  position: fixed; left: calc(var(--lw) + 12px); bottom: calc(var(--bh) + 12px);
  display: flex; flex-direction: column; gap: 3px; z-index: 160;
  transition: left var(--trans);
}
#left-panel.collapsed ~ #zoom-ctrl, body.lp-collapsed #zoom-ctrl { left: 12px; }
.zb { width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--bord2); background: var(--surf); backdrop-filter: var(--blur); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all .15s; font-family: 'IBM Plex Mono', monospace; }
.zb:hover { background: var(--accent2); color: var(--accent); border-color: var(--accent); }

/* ══ BOTTOM TICKER ══ */
#ticker-bar {
  position: fixed; bottom: 0; left: 0; right: 0; height: var(--bh);
  z-index: 200; display: flex; align-items: center;
  border-top: 1px solid var(--bord);
  background: var(--surf); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  overflow: hidden;
}
.ticker-label {
  flex-shrink: 0; padding: 0 14px; border-right: 1px solid var(--bord2); height: 100%;
  display: flex; align-items: center; gap: 6px; background: var(--accent3);
  font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: .14em; text-transform: uppercase; color: var(--accent);
}
.ticker-label::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
.ticker-track { flex: 1; overflow: hidden; height: 100%; display: flex; align-items: center; }
.ticker-inner { display: flex; gap: 0; animation: tscroll 80s linear infinite; white-space: nowrap; }
@keyframes tscroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.ticker-item { display: inline-flex; align-items: center; gap: 8px; padding: 0 16px; border-right: 1px solid var(--bord); height: var(--bh); cursor: pointer; transition: background .15s; }
.ticker-item:hover { background: var(--accent3); }
.ti-city { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500; color: var(--text); }
.ti-area { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: var(--text3); }
.ti-price { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text); }
.ti-delta { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 500; padding: 2px 5px; border-radius: 3px; }
.ti-delta.up { color: var(--green); background: rgba(0,229,160,.1); }
.ti-delta.dn { color: var(--red); background: rgba(255,68,85,.1); }

/* ══ LEFT PANEL TOGGLE ══ */
#lp-toggle {
  position: fixed; left: var(--lw); top: 50%; transform: translateY(-50%);
  z-index: 160; width: 20px; height: 44px; border-radius: 0 8px 8px 0;
  border: 1px solid var(--bord2); border-left: none;
  background: var(--surf); backdrop-filter: var(--blur);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text3); font-size: 10px; transition: all var(--trans);
}
#lp-toggle:hover { color: var(--accent); background: var(--accent2); }
body.lp-collapsed #lp-toggle { left: 0; }

/* ══ HEAT LEGEND ══ */
#heat-legend {
  position: fixed; left: calc(var(--lw) + 12px); top: calc(var(--th) + 40px + 12px);
  z-index: 160; padding: 10px 13px; border-radius: 10px;
  transition: left var(--trans);
}
body.lp-collapsed #heat-legend { left: 12px; }
.hl-title { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: .14em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; }
.hl-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
.hl-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.hl-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text2); }

/* ══ LOADING SCREEN ══ */
#loading {
  position: fixed; inset: 0; background: #03060F; z-index: 999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity .7s;
}
#loading.fade { opacity: 0; pointer-events: none; }

function interpolateColor(val, stops) {
  for (let i = 0; i < stops.length - 1; i++) {

function lerpHex(a, b, t) {
  const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);

  const bv = Math.round(ab + (bb - ab) * t).toString(16).padStart(2, '0');

function buildGeoJSON(areaIds) {
  const features = [];
  const source = areaIds ? AREAS.filter(a => areaIds.includes(a.id)) : AREAS;
  source.forEach(a => {
    const coords = AREA_POLYS[a.id];
    if (!coords || coords.length < 3) return;
    const ring = [...coords];
    if (ring[0][0] !== ring[ring.length-1][0] || ring[0][1] !== ring[ring.length-1][1]) ring.push(ring[0]);
    const col = areaColor(a);
    const isVisible = _tierFilter === 'all' || a.tier === _tierFilter;
    features.push({
      type: 'Feature',
      id: AREAS.indexOf(a),
      properties: {
        id: a.id, name: a.name, col, tier: a.tier,
        psf: a.psf, yoy: a.yoy, yld: a.yld, txn: a.txn, score: a.score,
        visible: isVisible,
        extrude: Math.max(50, (heatVal(a) / HEAT_CONFIGS[_heatMode].stops.slice(-1)[0][0]) * 600),
      },
      geometry: { type: 'Polygon', coordinates: [ring] }
    });
  });
  return { type: 'FeatureCollection', features };
}

/* ══════════════════════════════════════════════
   MAP INIT
══════════════════════════════════════════════ */
function initMap() {
  const isDark = document.documentElement.dataset.theme === 'dark';
  map = new maplibregl.Map({
    container: 'map',
    style: isDark ? STYLE_DARK : STYLE_LIGHT,
    center: DUBAI_CENTER,
    zoom: DUBAI_ZOOM,
    pitch: 0,
    bearing: 0,
    maxBounds: [[54.5, 24.5], [56.0, 25.8]],
  });

  map.on('load', () => {
    addAreaLayers();
    addMetroLayer();
    // Hide loading screen
    const l = document.getElementById('loading');
    l.classList.add('fade');
    setTimeout(() => l.style.display = 'none', 700);
  });

  map.on('error', e => {
    document.getElementById('load-status').textContent = 'Map error: ' + e.error?.message;
  });
}

/* ══════════════════════════════════════════════
   AREA LAYERS
══════════════════════════════════════════════ */
function addAreaLayers() {
  const geo = buildGeoJSON();

  // Remove existing
  ['area-label','area-fill','area-line','area-line-hi','area-extrude'].forEach(id => {
    try { if (map.getLayer(id)) map.removeLayer(id); } catch(e) {}
  });
  try { if (map.getSource('areas')) map.removeSource('areas'); } catch(e) {}

  map.addSource('areas', { type: 'geojson', data: geo, generateId: true });

  // Extrusion (3D fill)
  map.addLayer({
    id: 'area-extrude', type: 'fill-extrusion', source: 'areas',
    paint: {
      'fill-extrusion-color': ['get', 'col'],
      'fill-extrusion-height': ['*', ['get', 'extrude'], _viewMode === '3d' ? 1 : 0],
      'fill-extrusion-base': 0,
      'fill-extrusion-opacity': _viewMode === '3d' ? 0.75 : 0,
    },
    filter: ['==', ['get', 'visible'], true],
  });

  // Flat fill
  map.addLayer({
    id: 'area-fill', type: 'fill', source: 'areas',
    paint: {
      'fill-color': ['get', 'col'],
      'fill-opacity': ['case',
        ['boolean', ['feature-state', 'hover'], false], 0.72,
        ['interpolate', ['linear'], ['zoom'], 9, 0.45, 12, 0.35, 15, 0.22]
      ]
    },
    filter: ['==', ['get', 'visible'], true],
  });

  // Border
  map.addLayer({
    id: 'area-line', type: 'line', source: 'areas',
    paint: {
      'line-color': ['get', 'col'],
      'line-width': ['interpolate', ['linear'], ['zoom'], 9, 1.5, 11, 2.5, 14, 3],
      'line-opacity': 0.9,
    },
    filter: ['==', ['get', 'visible'], true],
  });

  // Inner highlight
  map.addLayer({
    id: 'area-line-hi', type: 'line', source: 'areas',
    paint: {
      'line-color': 'rgba(255,255,255,0.18)',
      'line-width': ['interpolate', ['linear'], ['zoom'], 9, 0.5, 13, 1],
      'line-offset': -1,
    },
    filter: ['==', ['get', 'visible'], true],
  });

  // Price labels
  map.addLayer({
    id: 'area-label', type: 'symbol', source: 'areas',
    layout: {
      'text-field': ['concat', ['get', 'name'], '\n', 'AED ', ['to-string', ['get', 'psf']], '/sqft'],
      'text-size': 10,
      'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
      'text-anchor': 'center',
      'text-max-width': 8,
    },
    paint: {
      'text-color': 'rgba(232,237,245,0.9)',
      'text-halo-color': 'rgba(3,6,15,0.8)',
      'text-halo-width': 2,
    },
    filter: ['all', ['==', ['get', 'visible'], true]],
  });
  if (!_layerState.labels) map.setLayoutProperty('area-label', 'visibility', 'none');

  // Hover interactions
  map.on('mousemove', 'area-fill', onAreaHover);
  map.on('mouseleave', 'area-fill', onAreaLeave);
  map.on('click', 'area-fill', onAreaClick);
}

function refreshAreaColors() {
  if (!map || !map.getSource('areas')) return;
  map.getSource('areas').setData(buildGeoJSON());
  // Update extrusion height for 3D mode
  const h = _viewMode === '3d' ? 1 : 0;
  const op = _viewMode === '3d' ? 0.75 : 0;
  try {
    map.setPaintProperty('area-extrude', 'fill-extrusion-height', ['*', ['get', 'extrude'], h]);
    map.setPaintProperty('area-extrude', 'fill-extrusion-opacity', op);
  } catch(e) {}
}

/* ══════════════════════════════════════════════
   METRO LAYER
══════════════════════════════════════════════ */
const METRO_LINES = {
  red: {
    color: '#FF4444',
    coords: [
      [55.4426,25.2028],[55.3932,25.1988],[55.3645,25.1952],[55.3428,25.1906],
      [55.3148,25.1842],[55.2948,25.1856],[55.2748,25.1892],[55.2548,25.2042],
      [55.2348,25.2042],[55.2148,25.2008],[55.1988,25.1948],[55.1788,25.1598],
      [55.1628,25.1248],[55.1448,25.0858],[55.1288,25.0548],[55.1108,25.0188],
      [55.0928,24.9918],
    ]
  },
  green: {
    color: '#22C87A',
    coords: [
      [55.3428,25.1906],[55.3248,25.2206],[55.3088,25.2456],[55.2908,25.2656],
      [55.2748,25.2892],[55.2588,25.3042],[55.2748,25.1892],
    ]
  }
};

function addMetroLayer() {
  ['metro-red','metro-green'].forEach(id => {
    try { if (map.getLayer(id)) map.removeLayer(id); } catch(e) {}
  });
  ['metro-src-red','metro-src-green'].forEach(id => {
    try { if (map.getSource(id)) map.removeSource(id); } catch(e) {}
  });

  Object.entries(METRO_LINES).forEach(([key, line]) => {
    map.addSource(`metro-src-${key}`, {
      type: 'geojson',
      data: { type: 'Feature', geometry: { type: 'LineString', coordinates: line.coords } }
    });
    map.addLayer({
      id: `metro-${key}`, type: 'line', source: `metro-src-${key}`,
      paint: {
        'line-color': line.color,
        'line-width': ['interpolate', ['linear'], ['zoom'], 9, 2, 12, 3.5],
        'line-opacity': 0.88,
      }
    });
    if (!_layerState.metro) map.setLayoutProperty(`metro-${key}`, 'visibility', 'none');
  });
}

/* ══════════════════════════════════════════════
   HOVER / CLICK
══════════════════════════════════════════════ */
function onAreaHover(e) {
  map.getCanvas().style.cursor = 'pointer';
  const feat = e.features[0];
  if (!feat) return;

  if (_hoverId !== null) map.setFeatureState({source:'areas',id:_hoverId}, {hover:false});
  _hoverId = feat.id;
  map.setFeatureState({source:'areas',id:_hoverId}, {hover:true});

  const a = AREAS.find(x => x.id === feat.properties.id);
  if (!a) return;

  // Tooltip
  if (!_tooltip) {
    _tooltip = new maplibregl.Popup({ closeButton: false, closeOnClick: false, maxWidth: '220px' });
  }
  const trend = a.yoy > 0;
  _tooltip.setLngLat(e.lngLat).setHTML(`
    <div class="map-tooltip">
      <div class="mt-name">${a.name}</div>
      <div class="mt-grid">
        <div class="mt-l">PSF</div><div class="mt-v">AED ${a.psf.toLocaleString()}</div>
        <div class="mt-l">YoY</div><div class="mt-v" style="color:${trend?'var(--green)':'var(--red)'}">${trend?'+':''}${a.yoy}%</div>
        <div class="mt-l">Yield</div><div class="mt-v">${a.yld}%</div>
        <div class="mt-l">Transactions</div><div class="mt-v">${a.txn.toLocaleString()}</div>
      </div>
    </div>
  `).addTo(map);
}

function onAreaLeave() {
  map.getCanvas().style.cursor = '';
  if (_hoverId !== null) { map.setFeatureState({source:'areas',id:_hoverId},{hover:false}); _hoverId = null; }
  if (_tooltip) { _tooltip.remove(); _tooltip = null; }
}

function onAreaClick(e) {
  const feat = e.features[0];
  if (!feat) return;
  const a = AREAS.find(x => x.id === feat.properties.id);
  if (a) selectArea(a);
}

/* ══════════════════════════════════════════════
   SELECT AREA
══════════════════════════════════════════════ */
function selectArea(a) {
  _selId = a.id;

  // Highlight in list
  document.querySelectorAll('.area-row').forEach(r => r.classList.toggle('active', r.dataset.id === a.id));

  // Fly to
  const c = CENTROIDS[a.id] || [55.27, 25.19];
  map.flyTo({ center: c, zoom: Math.max(map.getZoom(), 12.5), duration: 900 });

  // Right panel
  openDetail(a);
}

  // KPIs

      <div class="rp-kpi-v">${trend?'+':''}${a.yoy}%</div>
      <div class="rp-kpi-d ${trend?'up':'dn'}">${trend?'▲ Above':'▼ Below'} market avg</div>
    </div>
    <div class="rp-kpi">
      <div class="rp-kpi-l">Rental Yield</div>
      <div class="rp-kpi-v">${a.yld}%</div>
      <div class="rp-kpi-d ${a.yld > 6.5?'up':'dn'}">${a.yld > 6.5 ? '▲ Above avg' : '▼ Below avg'}</div>
    </div>

      <div class="rp-kpi-l">Transactions</div>
      <div class="rp-kpi-v">${a.txn.toLocaleString()}</div>
      <div class="rp-kpi-d up">2024 YTD</div>
    </div>
  `;

  // Score bar
  const scCol = scoreColor(a.score);

  document.getElementById('rp-score-v').style.color = scCol;
  const fill = document.getElementById('rp-bar-fill');
  fill.style.background = scCol;
  fill.style.width = '0%';
  setTimeout(() => fill.style.width = a.score + '%', 50);

  // Tags
  const tags = [a.tier, `${a.off}% Off-plan`, `${a.rdy}% Ready`, a.beds + ' beds', a.type];

  // Price chart
  const maxH = Math.max(...a.hist);
  const years = ['2020','2021','2022','2023','2024','2025'];
  document.getElementById('rp-chart').innerHTML = a.hist.map((v, i) => `
    <div class="rp-bar-col" style="height:${Math.round((v/maxH)*100)}%;background:${i===5?col:col+'88'}">
      <div class="rp-bar-tip">AED ${v.toLocaleString()}<br>${years[i]}</div>
    </div>
  `).join('');

  // Listings
  document.getElementById('rp-listings').innerHTML = `
    <div style="padding:12px 16px 6px;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)">Featured Listings</div>
    ${a.listings.map(l => `
      <div class="rp-listing">
        <div class="rp-listing-icon">${l.t}</div>
        <div class="rp-listing-info">
          <div class="rp-listing-type">${l.type}</div>
          <div class="rp-listing-name">${l.name}</div>
        </div>
        <div>
          <div class="rp-listing-price">${l.price}</div>
          <div class="rp-listing-size">${l.size}</div>
        </div>
      </div>
    `).join('')}
    <div style="padding:14px 16px;border-top:1px solid var(--bord);margin-top:4px">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px">Area Overview</div>
      <div style="font-family:'IBM Plex Sans',sans-serif;font-size:11px;color:var(--text2);line-height:1.6">${a.desc}</div>
    </div>
  `;

  document.getElementById('right-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('right-panel').classList.remove('open');
  _selId = null;
  document.querySelectorAll('.area-row').forEach(r => r.classList.remove('active'));
}

/* ══════════════════════════════════════════════
   HEAT MODE
══════════════════════════════════════════════ */
function setHeatMode(mode, btn) {
  _heatMode = mode;
  document.querySelectorAll('#heat-mode-pills .tb-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  refreshAreaColors();
  updateLegend();
  renderAreaList();
}

/* ══════════════════════════════════════════════
   VIEW MODE (2D / 3D)
══════════════════════════════════════════════ */
function setView(mode, btn) {
  _viewMode = mode;
  document.querySelectorAll('#topbar .tb-pill').forEach(b => {
    if (b.id === 'view-2d' || b.id === 'view-3d') b.classList.remove('active');
  });
  btn.classList.add('active');
  if (mode === '3d') {
    map.easeTo({ pitch: 45, bearing: -20, duration: 800 });
  } else {
    map.easeTo({ pitch: 0, bearing: 0, duration: 800 });
  }
  refreshAreaColors();
}

/* ══════════════════════════════════════════════
   SATELLITE
══════════════════════════════════════════════ */
function toggleSatellite() {
  _satMode = !_satMode;
  document.getElementById('sat-btn').classList.toggle('active', _satMode);
  const isDark = document.documentElement.dataset.theme === 'dark';
  const style = _satMode ? STYLE_SAT : (isDark ? STYLE_DARK : STYLE_LIGHT);
  map.setStyle(style);
  map.once('styledata', () => {
    setTimeout(() => {
      addAreaLayers();
      addMetroLayer();
      applyLayerVisibility();
    }, 200);
  });
}

/* ══════════════════════════════════════════════
   THEME
══════════════════════════════════════════════ */
function toggleTheme() {
  const isDark = document.documentElement.dataset.theme === 'dark';
  document.documentElement.dataset.theme = isDark ? 'light' : 'dark';
  document.getElementById('theme-btn').textContent = isDark ? '☽' : '☀';
  if (!_satMode) {
    map.setStyle(isDark ? STYLE_LIGHT : STYLE_DARK);
    map.once('styledata', () => {
      setTimeout(() => { addAreaLayers(); addMetroLayer(); applyLayerVisibility(); }, 200);
    });
  }
}

/* ══════════════════════════════════════════════
   LAYER TOGGLE
══════════════════════════════════════════════ */
function toggleLayer(id, btn) {
  _layerState[id] = !_layerState[id];
  btn.classList.toggle('active', _layerState[id]);
  applyLayerVisibility();
}

function applyLayerVisibility() {
  if (!map) return;
  const vis = on => on ? 'visible' : 'none';
  try {
    if (map.getLayer('area-fill')) map.setLayoutProperty('area-fill', 'visibility', vis(_layerState.areas));
    if (map.getLayer('area-line')) map.setLayoutProperty('area-line', 'visibility', vis(_layerState.areas));
    if (map.getLayer('area-line-hi')) map.setLayoutProperty('area-line-hi', 'visibility', vis(_layerState.areas));
    if (map.getLayer('area-extrude')) map.setLayoutProperty('area-extrude', 'visibility', vis(_layerState.extrude));
    if (map.getLayer('area-label')) map.setLayoutProperty('area-label', 'visibility', vis(_layerState.labels));
    if (map.getLayer('metro-red')) map.setLayoutProperty('metro-red', 'visibility', vis(_layerState.metro));
    if (map.getLayer('metro-green')) map.setLayoutProperty('metro-green', 'visibility', vis(_layerState.metro));
  } catch(e) {}
}

/* ══════════════════════════════════════════════
   TIER FILTER
══════════════════════════════════════════════ */
function setTierFilter(tier, btn) {
  _tierFilter = tier;
  document.querySelectorAll('[id^="tier-"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  refreshAreaColors();
  renderAreaList();
}

/* ══════════════════════════════════════════════
   LEFT PANEL
══════════════════════════════════════════════ */
function renderAreaList() {
  let list = [...AREAS];

  // Filter by search
  if (_searchTerm) {
    list = list.filter(a => a.name.toLowerCase().includes(_searchTerm.toLowerCase()));
  }

  // Filter by tier
  if (_tierFilter !== 'all') {
    list = list.filter(a => a.tier === _tierFilter);
  }

  // Sort
  list.sort((a, b) => {
    if (_sortMode === 'psf')   return b.psf - a.psf;
    if (_sortMode === 'yoy')   return b.yoy - a.yoy;
    if (_sortMode === 'yield') return b.yld - a.yld;
    if (_sortMode === 'name')  return a.name.localeCompare(b.name);
    return 0;
  });

  _areaList = list;

  const el = document.getElementById('area-list');
  el.innerHTML = list.map((a, i) => {
    const col = areaColor(a);
    const trend = a.yoy > 0;
    const val = _sortMode === 'yield' ? `${a.yld}%` : _sortMode === 'yoy' ? `${a.yoy}%` : `${a.psf.toLocaleString()}`;
    return `
      <div class="area-row${_selId===a.id?' active':''}" data-id="${a.id}" onclick="selectArea(AREAS.find(x=>x.id==='${a.id}'))">
        <span class="ar-rank">${i+1}</span>
        <div class="ar-dot" style="background:${col}"></div>
        <div class="ar-info">
          <div class="ar-name">${a.name}</div>
          <div class="ar-sub">${a.tier} · ${a.txn.toLocaleString()} txn</div>
        </div>
        <div>
          <div class="ar-psf">${val}</div>
          <div class="ar-yoy ${trend?'up':'dn'}">${trend?'+':''}${a.yoy}%</div>
        </div>
      </div>`;
  }).join('');
}

function filterAreas(term) {
  _searchTerm = term;
  renderAreaList();
}

function sortAreas(mode, btn) {
  _sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAreaList();
}

function toggleLeftPanel() {
  document.getElementById('left-panel').classList.toggle('collapsed');
  document.body.classList.toggle('lp-collapsed');
  document.getElementById('lp-toggle').textContent = document.body.classList.contains('lp-collapsed') ? '›' : '‹';
}

function resetView() {
  map.flyTo({ center: DUBAI_CENTER, zoom: DUBAI_ZOOM, pitch: 0, bearing: 0, duration: 1000 });
}

/* ══════════════════════════════════════════════
   LEGEND
══════════════════════════════════════════════ */
function updateLegend() {
  const cfg = HEAT_CONFIGS[_heatMode];
  document.getElementById('hl-title').textContent = cfg.label;
  const stops = cfg.stops;
  document.getElementById('hl-rows').innerHTML = stops.map(([val, col]) =>
    `<div class="hl-row">
      <div class="hl-swatch" style="background:${col}"></div>
      <div class="hl-label">${val.toLocaleString()}</div>
    </div>`
  ).join('');
}

   TICKER
══════════════════════════════════════════════ */

  {city:'Downtown',area:'Burj Vista',price:'AED 4,200,000',delta:'+12.4%',trend:'up'},

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
const LOAD_STEPS = ['Loading map engine...','Fetching basemap tiles...','Building area boundaries...','Computing heatmap scores...','Ready.'];
let _loadStep = 0;
const _loadTimer = setInterval(() => {
  _loadStep++;
  if (_loadStep < LOAD_STEPS.length) {
    document.getElementById('load-status').textContent = LOAD_STEPS[_loadStep];
  } else clearInterval(_loadTimer);
}, 420);

window.addEventListener('load', () => {
  buildTicker();
  renderAreaList();
  updateLegend();
  initMap();
});
</script>
